<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Traildiary</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
  <div class="topo-bg"></div>

  <!-- Onboarding -->
  <div id="onboarding" class="screen">
    <h1>Traildiary</h1>
    <p>Richte dein Profil ein um loszulegen.</p>
    <form id="onboarding-form">
      <input type="text" id="name" placeholder="Dein Name" required />
      <input type="number" id="weight" placeholder="Gewicht (kg)" required />
      <input type="number" id="age" placeholder="Alter" required />
      <select id="gender">
        <option value="male">Männlich</option>
        <option value="female">Weiblich</option>
      </select>
      <button type="submit">Loslegen</button>
    </form>
  </div>

  <!-- Dashboard / Pinnwand -->
  <div id="dashboard" class="screen hidden">
    <header>
      <h1>Traildiary</h1>
      <button id="settings-btn">Einstellungen</button>
    </header>

    <!-- Stats Bar -->
    <div id="stats">
      <div class="stat"><span id="total-rides">0</span><label>Rides</label></div>
      <div class="stat"><span id="total-km">0.0</span><label>km</label></div>
      <div class="stat"><span id="total-hm">0</span><label>Hm</label></div>
      <div class="stat"><span id="total-kcal">0</span><label>kcal</label></div>
    </div>

    <!-- Pinnwand -->
    <div id="pinboard-wrapper">
      <div id="pinboard-canvas">
        <!-- Polaroids werden hier per JS eingefügt -->
      </div>
    </div>

    <!-- + Ride Button -->
    <div class="add-ride-wrap">
      <button id="add-ride-btn">+ Ride anpinnen</button>
    </div>
  </div>

  <!-- Ride hinzufügen -->
  <div id="add-ride" class="screen hidden">
    <h2>Neuer Ride</h2>
    <form id="ride-form">
      <input type="text" id="trail-name" placeholder="Trailname" required />
      <input type="date" id="ride-date" required />
      <input type="number" id="distance" placeholder="Distanz (km)" step="0.1" required />
      <input type="number" id="duration" placeholder="Dauer (Minuten)" required />
      <input type="number" id="elevation" placeholder="Höhenmeter" required />
      <textarea id="description" placeholder="Beschreib deinen Ride..." rows="4" required></textarea>

      <!-- Bild Upload -->
      <div class="image-upload-area">
        <label class="upload-label">
          Fotos hinzufügen (1–3)
          <input type="file" id="image-upload" accept="image/*" multiple />
        </label>
        <div id="image-previews"></div>
        <p class="upload-hint">Erstes Bild wird als Polaroid-Cover verwendet.</p>
      </div>

      <button type="submit">Anpinnen</button>
      <button type="button" id="cancel-ride">Abbrechen</button>
    </form>
  </div>

  <!-- Detail Modal -->
  <div id="detail-modal" class="hidden">
    <div id="modal-backdrop"></div>
    <div id="modal-content">
      <button id="modal-close">✕</button>

      <!-- Bildergalerie -->
      <div id="modal-gallery">
        <img id="modal-main-img" src="" alt="" />
        <div id="modal-thumbs"></div>
      </div>

      <!-- Infos -->
      <div id="modal-info">
        <h2 id="modal-title"></h2>
        <p id="modal-date"></p>
        <p id="modal-description"></p>
        <div id="modal-stats">
          <div class="modal-stat"><span id="modal-km"></span><label>km</label></div>
          <div class="modal-stat"><span id="modal-hm"></span><label>Hm</label></div>
          <div class="modal-stat"><span id="modal-duration"></span><label>min</label></div>
          <div class="modal-stat"><span id="modal-kcal"></span><label>kcal</label></div>
        </div>
        <button id="modal-delete" class="delete-ride-btn">Ride löschen</button>
      </div>
    </div>
  </div>

  <!-- Einstellungen -->
  <div id="settings" class="screen hidden">
    <h2>Profil bearbeiten</h2>
    <form id="settings-form">
      <input type="text" id="settings-name" placeholder="Dein Name" required />
      <input type="number" id="settings-weight" placeholder="Gewicht (kg)" required />
      <input type="number" id="settings-age" placeholder="Alter" required />
      <select id="settings-gender">
        <option value="male">Männlich</option>
        <option value="female">Weiblich</option>
      </select>
      <button type="submit">Speichern</button>
      <button type="button" id="cancel-settings">Abbrechen</button>
    </form>
  </div>

  <script src="app.js"></script>
</body>
</html>
